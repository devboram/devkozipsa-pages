    img { max-width: 100%; height: auto; }

        padding: 16px; 
        word-break: break-all; 
        visibility: hidden;

<body class="toastui-editor-contents"> 
  
    개인정보 수집

<script>
  (function() {
  document.body.style.visibility = 'visible';

  function callNative() {   
      var isAndroid = /Android/i.test(navigator.userAgent);
      var hasBridge = window.Native && typeof window.Native.onPageFinished === 'function';

      if (hasBridge) {
          window.Native.onPageFinished();
      } else if (isAndroid) {
          setTimeout(callNative, 100);
      } else {
          console.log("Non-Android device. Bridge ignored.");
      }
  }

  callNative();
})();
  </script>
</body>
</html>
