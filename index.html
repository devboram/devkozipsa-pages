<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KOZIPSA Apple Login</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .message { margin-top: 20px; font-size: 16px; color: #333; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="loader" id="loader"></div>
    <div class="message" id="status-message">인증 정보를 확인했습니다.<br>잠시 후 앱으로 돌아갑니다.</div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const idToken = urlParams.get('id_token');
            const code = urlParams.get('code');
            const state = urlParams.get('state');

            const messageElement = document.getElementById('status-message');
            const loaderElement = document.getElementById('loader');

            if (idToken) {
                const scheme = "kozipsa-auth";
                const host = "apple-callback";
                const deepLink = `${scheme}://${host}?id_token=${idToken}&code=${code}&state=${state}`;
                
                // 1. 1.5초 정도 대기 후 앱으로 리다이렉트 (사용자가 메시지를 읽을 시간 제공)
                setTimeout(function() {
                    window.location.href = deepLink;
                    
                    // 2. 리다이렉트 후 브라우저 상태 업데이트
                    messageElement.innerHTML = "앱이 실행되지 않으면<br><b>[뒤로가기]</b>를 눌러주세요.";
                    loaderElement.style.display = "none";
                }, 1500); 

                // 3. 마지막으로 브라우저 창 닫기 시도 (일부 브라우저에서만 작동)
                setTimeout(function() {
                    window.close();
                }, 5000); 
            } else {
                messageElement.innerText = "인증 정보를 찾을 수 없습니다. 다시 시도해 주세요.";
                loaderElement.style.display = "none";
            }
        };
    </script>
</body>
</html>
